          <div class="filter-panel">
            <h2>Color</h2>
            <label><input type="radio" name="color" checked /><i class="swatch swatch--red"></i> Red <span>103</span></label>
            <label><input type="radio" name="color" /><i class="swatch swatch--blue"></i> Blue <span>23</span></label>
            <label><input type="radio" name="color" /><i class="swatch swatch--brown"></i> Brown <span>12</span></label>
            <label><input type="radio" name="color" /><i class="swatch swatch--orange"></i> Orange <span>22</span></label>
            <label><input type="radio" name="color" /><i class="swatch swatch--yellow"></i> Yellow <span>1</span></label>
            <label><input type="radio" name="color" /><i class="swatch swatch--pink"></i> Pink <span>22</span></label>
          </div>
          <div class="filter-panel">
            <h2>Size</h2>
            <label><input type="radio" name="size" checked /> Extra Large</label>
            <label><input type="radio" name="size" /> Large</label>
            <label><input type="radio" name="size" /> Medium</label>
            <label><input type="radio" name="size" /> Small</label>
            <label><input type="radio" name="size" /> Extra Small</label>
          </div>
          <div class="filter-panel price-filter">
            <h2>Filter by price</h2>
            <div class="price-range"><i></i><span style="left: 10%">15</span><span style="left: 77%">250</span></div>
            <div class="price-values"><span>15$</span><span>250$</span></div>
          </div>
          <div class="filter-panel">
